<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="calendar-styles/calendar.css">
    <link rel="stylesheet" href="calendar-styles/createEventPopup.css">
    <link rel="stylesheet" href="calendar-styles/saveEventPopup.css">
    <link rel="stylesheet" href="calendar-styles/repetitionConfigPopup.css">
    <link rel="stylesheet" href="calendar-styles/endDatePicker.css">
</head>
<body>
    <main>
        <section class="calendar">
            <!-- Tabela com os dias do mês -->
            <table class="month">
                <caption class="calendar-header">
                    <div class="calendar-controls">
                        <button class="previous-month">&#9664;</button>
                        <button class="next-month">&#9654;</button>
                    </div>
                    <span class="calendar-title">?? de 20??</span>
                </caption>
                <thead>
                    <!-- Todas as 7 colunas -->
                    <tr class="days-of-the-week-columns">
                        <th class="days-of-the-week" style="color: var(--sun-color);">DOM.</th>
                        <th class="days-of-the-week">SEG.</th>
                        <th class="days-of-the-week">TER.</th>
                        <th class="days-of-the-week">QUA.</th>
                        <th class="days-of-the-week">QUI.</th>
                        <th class="days-of-the-week">SEX.</th>
                        <th class="days-of-the-week" style="color: var(--sat-color);">SÁB.</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Todas as 6 linhas -->
                    <tr class="days-line">
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                    </tr>
                    <tr class="days-line">
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                    </tr>
                    <tr class="days-line">
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                    </tr>
                    <tr class="days-line">
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days marked-day">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days marked-day">?</td>
                    </tr>
                    <tr class="days-line">
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                    </tr>
                    <tr class="days-line">
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                        <td class="days">?</td>
                    </tr>
                </tbody>
            </table>
            <!-- Pop-up que lista os eventos do dia clicado e que permite criar um novo evento -->
            <aside class="add-event" aria-labelledby="popup-title" role="dialog" hidden>
                <span class="event-date">?? de 20??</span>
                <div class="saved-events">
                    <!-- Os spans de eventos salvos são inseridos dinamicamente via JS (ver createEvent.js).
                         Quando não há eventos no dia, fica apenas um span vazio como espaço reservado. -->
                </div>
                <button type="button" class="create-event-button">Criar</button>
            </aside>
            <!-- Pop-up para salvar um novo evento no dia que foi clicado -->
            <aside class="save-event-popup" aria-label="Save Event Popup" hidden>
                <!-- action="/salvar-evento" method="post" -->
                <form class="save-event-form">
                    <!-- Grupo de ações do evento -->
                    <div class="save-event-form-group1">
                        <!-- Botão para fechar o pop-up, visível apenas após o salvamento -->
                        <button type="button" class="material-icons close-save-event-popup" aria-label="Voltar" hidden>arrow_back</button>
                        <!-- Botão para salvar o evento, visível apenas enquanto está editando -->
                        <button type="submit" class="material-icons save-event-button" aria-label="Salvar evento">check</button>
                        <!-- Campo de título do evento: visível em modo de edição e substituído por texto fixo após o salvamento -->
                        <input type="text" name="event-name" id="event-name" maxlength="50" placeholder="Título" aria-labelledby="event-name-label" autocomplete="off">
                        <h3 class="event-name" id="event-name-label" hidden>?</h3>
                        <!-- Botão para escolher cor, visível apenas enquanto está editando -->
                        <button type="button" id="color-picker" aria-label="Escolher cor"></button>
                        <!-- Botão de editar, visível apenas após salvar o evento -->
                        <button type="button" class="material-icons edit-event-button" aria-label="Editar evento" hidden>edit</button>
                        <!-- Botão de limpar, visível apenas enquanto está editando -->
                        <button type="reset" class="material-icons clear-event-button" aria-label="Limpar campos">backspace</button>
                    </div>
                    <!-- Seção de data e hora do evento -->
                    <div class="save-event-form-group2">
                        <span class="save-event-popup-status">Editando</span>
                        <span class="event-date-time">
                            <i class="material-icons" aria-hidden="true">event</i> <!-- Ícone de calendário -->
                            <p aria-label="Data do Evento">??/??/20???</p> <!-- Data do dia clicado -->
                            <!-- Ícone de recorrência: só aparece quando a frequência for diferente de "Uma só vez" -->
                            <i class="material-icons recurrence-icon" aria-label="Evento recorrente" hidden>repeat</i>
                        </span>
                    </div>
                    <!-- Campo de descrição do evento: visível em modo de edição e substituído por texto fixo após o salvamento -->
                    <textarea name="event-description" id="event-description" placeholder="Descrição" aria-labelledby="event-description-label" autocomplete="off"></textarea>
                    <p class="event-description" id="event-description-label" hidden>?</p>
                </form>
                <aside class="color-picker-popup" hidden>
                    <div class="color-picker-popup-square">
                        <div class="color-picker-popup-content">
                            <button type="button" style="background-color: var(--red-marker-bg-color);" class="color-picker-button"></button>
                            <button type="button" style="background-color: var(--orange-marker-bg-color);" class="color-picker-button"></button>
                            <button type="button" style="background-color: var(--yellow-marker-bg-color);" class="color-picker-button"></button>
                            <button type="button" style="background-color: var(--green-marker-bg-color);" class="color-picker-button"></button>
                            <button type="button" style="background-color: var(--blue-marker-bg-color);" class="color-picker-button"></button>
                            <button type="button" style="background-color: var(--pink-marker-bg-color);" class="color-picker-button"></button>
                            <button type="button" style="background-color: var(--black-marker-bg-color);" class="color-picker-button"></button>
                            <button type="button" style="background-color: var(--gray-marker-bg-color);" class="color-picker-button"></button>
                            <button type="button" style="background-color: var(--white-marker-bg-color);" class="color-picker-button"></button>
                        </div>
                    </div>
                </aside>
            </aside>
            <!-- Pop-up para configurar a repetição do evento -->
            <aside class="repetition-config-popup" aria-label="Configurar Repetição" hidden>
                <form class="repetition-config-form">
                    <!-- Botão para descartar (resetar) as configurações de repetição -->
                    <button type="button" class="discard-repetition-button">Descartar</button>
                    <!-- Grupo "Quando": data do evento que está sendo criado -->
                    <div class="repetition-config-group">
                        <label class="repetition-config-label">Quando</label>
                        <span class="repetition-when-weekday">?</span>
                        <span class="repetition-when-date">
                            <i class="material-icons" aria-hidden="true">event</i>
                            <span class="repetition-when-date-text">? de ??? de 20??</span>
                        </span>
                    </div>
                    <!-- Grupo "Repetição": frequência com que o evento se repete -->
                    <div class="repetition-config-group">
                        <label class="repetition-config-label" for="repetition-frequency">Repetição <i class="material-icons" aria-hidden="true">sync_alt</i></label>
                        <select id="repetition-frequency" class="repetition-config-select">
                            <option value="once">Uma só vez</option>
                            <option value="daily">Diariamente</option>
                            <option value="weekly">Semanalmente</option>
                            <option value="biweekly">Quinzenalmente</option>
                            <option value="monthly">Mensalmente</option>
                            <option value="yearly">Anualmente</option>
                        </select>
                    </div>
                    <!-- Grupo "Término": data em que a repetição deixa de ocorrer ("Nunca" por padrão) -->
                    <div class="repetition-config-group">
                        <label class="repetition-config-label">Término</label>
                        <span class="repetition-end">
                            <i class="material-icons" aria-hidden="true">event</i>
                            <span class="repetition-end-text">Nunca</span>
                        </span>
                    </div>
                    <!-- Botões inferiores: cancelar mantém o estado anterior, "Pronto" salva as escolhas -->
                    <div class="repetition-config-actions">
                        <button type="button" class="cancel-repetition-button">Cancelar</button>
                        <button type="submit" class="confirm-repetition-button">Pronto</button>
                    </div>
                </form>
            </aside>
            <!-- Pop-up customizado para escolher a data de término da repetição -->
            <aside class="end-date-picker-popup" aria-label="Escolher data de término" hidden>
                <div class="end-date-picker-card">
                    <header class="end-date-picker-header">
                        <span class="end-date-picker-year">2026</span>
                        <h2 class="end-date-picker-selected">Dom., 21 de jun.</h2>
                    </header>
                    <div class="end-date-picker-nav">
                        <button type="button" class="end-date-picker-prev" aria-label="Mês anterior">&#9664;</button>
                        <span class="end-date-picker-month-title">junho de 2026</span>
                        <button type="button" class="end-date-picker-next" aria-label="Próximo mês">&#9654;</button>
                    </div>
                    <div class="end-date-picker-weekdays">
                        <span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span>
                    </div>
                    <div class="end-date-picker-grid">
                        <!-- Os dias são inseridos dinamicamente via JS -->
                    </div>
                    <!-- Lista de anos exibida quando o usuário clica no ano do cabeçalho -->
                    <div class="end-date-picker-year-list" hidden>
                        <!-- Os anos são inseridos dinamicamente via JS -->
                    </div>
                    <div class="end-date-picker-actions">
                        <button type="button" class="end-date-picker-cancel">Cancelar</button>
                        <button type="button" class="end-date-picker-ok">OK</button>
                    </div>
                </div>
            </aside>
        </section>
    </main>
    <script type="module" src="/calendar-scripts/showCalendar.js"></script>
</body>
</html>
